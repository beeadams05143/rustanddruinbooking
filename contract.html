<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign performance contract</title>
    <style>
      :root {
        --bg: #f5edd8;
        --surface: rgba(255, 252, 245, 0.92);
        --border: rgba(91, 56, 31, 0.16);
        --text: #3f2a1d;
        --muted: #6d5647;
        --accent: #c17a3a;
        --accent-dark: #8b4a1a;
        --shadow: 0 18px 40px rgba(91, 56, 31, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 700;
        color: var(--accent-dark);
      }

      h1 {
        font-size: 1.65rem;
      }

      h2 {
        font-size: 1.25rem;
      }

      .page {
        width: min(100%, 600px);
        margin: 0 auto;
        padding: 20px 16px 48px;
      }

      .shell {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: var(--shadow);
        padding: 22px 20px;
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 10px;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        background: rgba(193, 122, 58, 0.15);
        color: var(--accent-dark);
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .meta {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .meta p {
        margin: 0;
      }

      .fee-grid {
        display: grid;
        gap: 8px;
        margin-top: 8px;
        font-size: 0.95rem;
      }

      .fee-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px dashed var(--border);
        padding-bottom: 6px;
      }

      .contract-scroll {
        margin-top: 18px;
        max-height: min(55vh, 420px);
        overflow: auto;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.65);
      }

      .contract-scroll :where(h1, h2, h3) {
        font-family: Georgia, "Times New Roman", serif;
      }

      .sign-section {
        margin-top: 28px;
        padding: 20px;
        border-radius: 18px;
        border: 2px solid var(--accent);
        background: rgba(193, 122, 58, 0.08);
      }

      label {
        display: grid;
        gap: 8px;
        margin-top: 14px;
        font-size: 0.92rem;
        color: var(--muted);
      }

      input[type="text"] {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(91, 56, 31, 0.22);
        font: inherit;
        background: #fff;
        color: var(--text);
      }

      .check-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-top: 16px;
        font-size: 0.95rem;
        color: var(--text);
      }

      .check-row input {
        margin-top: 4px;
      }

      button.primary-btn {
        width: 100%;
        margin-top: 18px;
        padding: 14px 16px;
        border: 0;
        border-radius: 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        background: var(--accent-dark);
        color: #fff;
      }

      button.primary-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .notice,
      .success {
        margin-top: 14px;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid var(--border);
      }

      .success {
        background: rgba(139, 74, 26, 0.1);
        color: var(--accent-dark);
      }

      .hidden {
        display: none !important;
      }

      .payment-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      #signStatus {
        margin-top: 10px;
        min-height: 1.25em;
        font-size: 0.9rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="shell stack" id="app">
        <p class="meta">Loading contract…</p>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://ipxjalcgiaqcyubrxqxu.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlweGphbGNnaWFxY3l1YnJ4cXh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NTY3MzUsImV4cCI6MjA4NzAzMjczNX0.b4RpnOTLAqpA4t6UntLPESK1gzUHtLNYHQNw54ghUmQ";
      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const params = new URLSearchParams(window.location.search);
      const contractId = params.get("id");
      const app = document.getElementById("app");
      let activeContractTable = "contracts";

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatMoney(value) {
        const n = Number(value);
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          minimumFractionDigits: 2,
          maximumFractionDigits: 2,
        }).format(Number.isFinite(n) ? n : 0);
      }

      function formatDisplayDate(value) {
        if (!value) return "";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString("en-US", {
          dateStyle: "long",
          timeStyle: "short",
        });
      }

      function formatEventDate(value) {
        if (!value) return "—";
        const parsed = new Date(`${value}T12:00:00`);
        if (Number.isNaN(parsed.getTime())) return escapeHtml(value);
        return parsed.toLocaleDateString("en-US", { dateStyle: "long" });
      }

      function normalizeVenmoHandle(value) {
        return String(value || "")
          .trim()
          .replace(/^@+/, "")
          .replace(/^https?:\/\/(www\.)?venmo\.com\//i, "")
          .split(/[/?#]/)[0]
          .trim();
      }

      function normalizePaypalHandle(value) {
        return String(value || "")
          .trim()
          .replace(/^@+/, "")
          .replace(/^https?:\/\/(www\.)?paypal\.me\//i, "")
          .split(/[/?#]/)[0]
          .trim();
      }

      function getPaymentConfig(meta = {}) {
        const venmoHandle = normalizeVenmoHandle(meta.venmoHandle || "");
        const paypalHandle = normalizePaypalHandle(meta.paypalHandle || "");
        return {
          venmoHandle,
          paypalHandle,
          hasVenmo: Boolean(venmoHandle),
          hasPaypal: Boolean(paypalHandle),
          hasAny: Boolean(venmoHandle || paypalHandle),
        };
      }

      function renderPaymentActions(amount, note, meta = {}) {
        const config = getPaymentConfig(meta);
        const displayAmount = String(Number(amount || 0).toFixed(2));
        const encodedNote = encodeURIComponent(note);
        if (!config.hasAny) {
          return `<p class="meta">Payment method not configured — contact the band directly to pay.</p>`;
        }
        return `
          <div class="payment-buttons">
            ${config.hasVenmo ? `<button type="button" class="primary-btn" style="width:auto;margin-top:0" onclick="window.location.assign('https://venmo.com/${escapeHtml(config.venmoHandle)}?txn=pay&amount=${escapeHtml(displayAmount)}&note=${escapeHtml(encodedNote)}')">Pay with Venmo</button>` : ""}
            ${config.hasPaypal ? `<button type="button" class="primary-btn" style="width:auto;margin-top:0" onclick="window.location.assign('https://paypal.me/${escapeHtml(config.paypalHandle)}/${escapeHtml(displayAmount)}')">Pay with PayPal</button>` : ""}
          </div>
        `;
      }

      function setUnavailable() {
        app.innerHTML = "<p>This contract is no longer available.</p>";
      }

      function getContractPaymentMeta(contract = {}, bandDNA = {}) {
        return {
          venmoHandle: contract.venmo_handle || bandDNA.venmoHandle || "",
          paypalHandle: contract.paypal_handle || bandDNA.paypalHandle || "",
        };
      }

      function renderSigned(contract, bandDNA = {}) {
        const name = escapeHtml(contract.client_signature || contract.client_name || "Client");
        const when = formatDisplayDate(contract.signed_at);
        const paymentActions = renderPaymentActions(
          contract.deposit_amount ?? 0,
          `${contract.band_name || "Band"} deposit`,
          getContractPaymentMeta(contract, bandDNA)
        );
        app.innerHTML = `
          <div class="stack">
            <span class="eyebrow">Performance contract</span>
            <h1>Already signed</h1>
            <p class="meta">This contract has already been signed by ${name} on ${escapeHtml(when)}. Thank you!</p>
            ${paymentActions}
          </div>
        `;
      }

      function renderSuccess(contract, clientName, bandDNA = {}) {
        const band = escapeHtml(contract.band_name || "Rust and Ruin");
        const dep = formatMoney(contract.deposit_amount ?? 0);
        const methods = escapeHtml(contract.payment_methods || "the payment options in your agreement");
        const signedAt = escapeHtml(formatDisplayDate(new Date().toISOString()));
        const bodyHtml = contract.contract_text ? String(contract.contract_text) : String(contract.legal_text || "");
        const paymentActions = renderPaymentActions(
          contract.deposit_amount ?? 0,
          `${contract.band_name || "Band"} deposit`,
          getContractPaymentMeta(contract, bandDNA)
        );
        app.innerHTML = `
          <div class="stack">
            <div class="success">
              <h1>✓ Contract signed!</h1>
              <p>${band} will be in touch soon about next steps. Your deposit of ${dep} can be paid via ${methods}.</p>
              ${paymentActions}
              <p class="meta"><strong>Signed as:</strong> ${escapeHtml(clientName)}</p>
              <p class="meta"><strong>Signed at:</strong> ${signedAt}</p>
              <button type="button" class="primary-btn" onclick="window.print()">Download / Print signed contract</button>
            </div>
            <div class="contract-scroll" style="max-height:none">${bodyHtml}</div>
          </div>
        `;
      }

      function renderContractPage(contract, bandDNA = {}) {
        const band = escapeHtml(contract.band_name || "Rust and Ruin");
        const client = escapeHtml(contract.client_name || "there");
        const clientEmail = escapeHtml(contract.client_email || "—");
        const venue = escapeHtml(contract.venue_name || contract.venue_address || "—");
        const venueAddress = escapeHtml(contract.venue_address || contract.venue_name || "—");
        const bandAddress = escapeHtml(contract.band_address || bandDNA.homeAddress || "—");
        const bandEmail = escapeHtml(contract.band_email || bandDNA.contactEmail || "—");
        const bandPhone = escapeHtml(contract.band_phone || bandDNA.contactPhone || "—");
        const bandSignatureName = escapeHtml(contract.band_signature_name || bandDNA.signoffName || contract.band_name || "Band representative");
        const evDate = formatEventDate(contract.event_date);
        const evType = escapeHtml(contract.event_type || "—");
        const pStart = escapeHtml(contract.performance_time || "—");
        const pEnd = escapeHtml(contract.performance_end_time || "—");
        const hours = escapeHtml(contract.hours || "—");
        const lineup = escapeHtml(contract.lineup || "—");
        const perfFee = formatMoney(contract.performance_fee ?? 0);
        const depDue = formatMoney(contract.deposit_amount ?? 0);
        const dayOf = formatMoney(contract.amount_due_day_of ?? 0);
        const bodyHtml = contract.contract_text
          ? String(contract.contract_text)
          : String(contract.legal_text || "<p><em>Contract text will appear here once saved from the booking app.</em></p>");
        const pay = escapeHtml(
          contract.payment_methods ||
            "the payment options in your agreement"
        );
        const paymentActions = renderPaymentActions(
          contract.deposit_amount ?? 0,
          `${contract.band_name || "Band"} deposit`,
          getContractPaymentMeta(contract, bandDNA)
        );

        app.innerHTML = `
          <div class="stack">
            <span class="eyebrow">Performance contract</span>
            <h1>${band}</h1>
            <p class="meta">Hi ${client}!</p>
            <div class="meta stack">
              <p><strong>Client email:</strong> ${clientEmail}</p>
              <p><strong>Event date:</strong> ${evDate}</p>
              <p><strong>Venue:</strong> ${venue}</p>
              <p><strong>Venue address:</strong> ${venueAddress}</p>
              <p><strong>Event type:</strong> ${evType}</p>
              <p><strong>Performance:</strong> ${pStart} – ${pEnd}</p>
              <p><strong>Hours / lineup:</strong> ${hours} · ${lineup}</p>
              <p><strong>Band contact:</strong> ${bandEmail} · ${bandPhone}</p>
              <p><strong>Band address:</strong> ${bandAddress}</p>
              <p><strong>Band signature:</strong> ${bandSignatureName}</p>
            </div>
            <div>
              <h2>Agreement</h2>
              <div class="contract-scroll" id="contractBody">${bodyHtml}</div>
            </div>
            <div>
              <h2>Fee summary</h2>
              <div class="fee-grid">
                <div class="fee-row"><span>Performance fee</span><span>${perfFee}</span></div>
                <div class="fee-row"><span>Deposit due</span><span>${depDue}</span></div>
                <div class="fee-row"><span>Amount due day of show</span><span>${dayOf}</span></div>
              </div>
              <p class="meta" style="margin-top:12px"><strong>Payment methods:</strong> ${pay}</p>
              ${paymentActions}
            </div>
            <div class="sign-section stack">
              <h2>Sign this contract</h2>
              <p class="meta" style="color:var(--text)">
                Type your full legal name below to sign. Your typed name serves as your legal signature and
                will be recorded with a timestamp.
              </p>
              <label>
                Full legal name (required)
                <input type="text" id="legalName" autocomplete="name" />
              </label>
              <div class="check-row">
                <input type="checkbox" id="agreeTerms" />
                <span>I have read and agree to all terms of this performance contract</span>
              </div>
              <button type="button" class="primary-btn" id="signBtn" disabled>I agree and sign this contract</button>
              <p id="signStatus"></p>
            </div>
          </div>
        `;

        const legalName = document.getElementById("legalName");
        const agreeTerms = document.getElementById("agreeTerms");
        const signBtn = document.getElementById("signBtn");
        const signStatus = document.getElementById("signStatus");

        function refreshSignButton() {
          const ok =
            Boolean(legalName.value.trim()) && agreeTerms.checked;
          signBtn.disabled = !ok;
        }

        legalName.addEventListener("input", refreshSignButton);
        agreeTerms.addEventListener("change", refreshSignButton);

        signBtn.addEventListener("click", async () => {
          const clientName = legalName.value.trim();
          if (!clientName || !agreeTerms.checked) {
            signStatus.textContent = "Enter your full legal name and confirm you agree to the terms.";
            return;
          }
          signBtn.disabled = true;
          signStatus.textContent = "Signing…";
          const signedAt = new Date().toISOString();
          const { error } = await supabaseClient
            .from(activeContractTable)
            .update({
              signed_at: signedAt,
              client_signature: clientName,
              signed_ip: null,
            })
            .eq("id", contractId);
          if (error) {
            signStatus.textContent = "We could not save your signature. Please try again.";
            signBtn.disabled = false;
            return;
          }
          if (contract?.event_id) {
            const { error: eventError } = await supabaseClient
              .from("events")
              .update({
                contract_signed_at: signedAt,
                contract_signer_name: clientName,
              })
              .eq("id", contract.event_id);
            if (eventError) {
              console.warn("Could not update booking-flow fields on event record:", eventError);
            }
          }
          contract.signed_at = signedAt;
          contract.client_signature = clientName;
          renderSuccess(contract, clientName, bandDNA);
        });
      }

      async function loadBandDNA() {
        try {
          const { data } = await supabaseClient
            .from("app_settings")
            .select("value")
            .eq("key", "band_dna")
            .maybeSingle();
          return data?.value ? (JSON.parse(data.value) || {}) : {};
        } catch (error) {
          return {};
        }
      }

      async function loadContract() {
        if (!contractId) {
          setUnavailable();
          return;
        }
        try {
          const bandDNA = await loadBandDNA();
          let contract = null;
          let error = null;
          ({ data: contract, error } = await supabaseClient
            .from("contracts")
            .select("*")
            .eq("id", contractId)
            .maybeSingle());
          activeContractTable = "contracts";
          if (error || !contract) {
            setUnavailable();
            return;
          }
          if (contract.signed_at) {
            renderSigned(contract, bandDNA);
            return;
          }
          renderContractPage(contract, bandDNA);
        } catch (e) {
          setUnavailable();
        }
      }

      loadContract();
    </script>
  </body>
</html>
